<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>อิ่มพอดี — ผู้ช่วยคำนวณอาหารตาม TDEE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF5EF; --surface:#FFFFFF; --surface-soft:#E4EFE6; --ink:#1C2B22; --ink-soft:#5C6B62;
    --line:#D7E5DA; --emerald:#2F9E6E; --emerald-deep:#1F7A54; --coral:#FF6B4A; --coral-deep:#E14E30;
    --blue:#4C7EF3; --blue-deep:#3560D0; --gold:#F0AE2E; --gold-deep:#C9890F;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); font-family:'Sarabun',sans-serif; color:var(--ink); }
  button { font-family:'Sarabun',sans-serif; transition: transform .12s ease, opacity .12s ease; cursor:pointer; }
  button:active { transform: scale(.96); }
  input, select { font-family:'Sarabun',sans-serif; }
  input:focus, select:focus { border-color: var(--emerald) !important; outline:none; }
  #root { max-width:430px; margin:0 auto; padding:20px 16px 100px; }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:22px; padding:18px; }
  .card-title { font-family:'Kanit'; font-weight:600; font-size:16px; margin-bottom:12px; }
  .row-between { display:flex; justify-content:space-between; align-items:center; }
  .progress-track { background:var(--surface-soft); border-radius:999px; height:10px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:999px; transition:width .4s ease; }
  .field-label { font-family:'Sarabun'; font-size:12px; color:var(--ink-soft); margin-bottom:4px; font-weight:600; }
  .field-input { width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font-size:14px; color:var(--ink); }
  .primary-btn { width:100%; border:none; background:var(--ink); color:#fff; border-radius:14px; padding:13px 0; font-weight:700; font-size:15px; }
  .ghost-btn { margin-top:12px; border:1.5px solid var(--emerald); color:var(--emerald-deep); background:transparent; border-radius:999px; padding:8px 18px; font-weight:600; font-size:13px; }
  .arrow-btn { width:30px; height:30px; border-radius:50%; border:1px solid var(--line); background:var(--surface-soft); color:var(--ink); font-size:18px; line-height:28px; }
  .swatch { width:26px; height:26px; border-radius:50%; }
  .tabbar { position:fixed; bottom:0; left:0; right:0; display:flex; justify-content:center; pointer-events:none; }
  .tabbar-inner { width:100%; max-width:430px; background:var(--surface); border-top:1px solid var(--line); display:flex; padding:8px 10px calc(env(safe-area-inset-bottom,0px) + 8px); pointer-events:auto; }
  .tab-btn { flex:1; border:none; background:transparent; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; color:var(--ink-soft); }
  .tab-btn.active { color:var(--emerald-deep); }
  @media (prefers-reduced-motion: no-preference){ .bob{ animation: bob 3.2s ease-in-out infinite; } }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ---------------- Config & helpers ---------------- */
const SKIN_TONES = ["#FFDDB8","#F0B784","#C6875A","#8A5A34"];
const HAIR_COLORS = ["#20140C","#5A3722","#A9713A","#2B2B2E","#D9C9A0"];
const HAIR_STYLES = ["สั้น","หยิก","ยาว","ผมทรงตัด"];
const SHIRT_COLORS = ["#FF6B4A","#4C7EF3","#2F9E6E","#F0AE2E","#8E6BC7","#1C2B22"];
const PANTS_COLORS = ["#28384A","#4C7EF3","#8A99A0","#1C2B22","#7A5334"];
const SHOE_COLORS = ["#1C2B22","#FFFFFF","#FF6B4A","#F0AE2E"];
const ACTIVITY_LEVELS = [
  {id:"sedentary", label:"แทบไม่ออกกำลังกาย", mult:1.2},
  {id:"light", label:"ออกกำลังกายเบาๆ 1-3 วัน/สัปดาห์", mult:1.375},
  {id:"moderate", label:"ออกกำลังกายปานกลาง 3-5 วัน/สัปดาห์", mult:1.55},
  {id:"active", label:"ออกกำลังกายหนัก 6-7 วัน/สัปดาห์", mult:1.725},
  {id:"veryActive", label:"ออกกำลังกายหนักมาก / ใช้แรงงาน", mult:1.9},
];
const GOALS = [
  {id:"lose", label:"ลดน้ำหนัก", adj:-0.15},
  {id:"maintain", label:"รักษาน้ำหนัก", adj:0},
  {id:"gain", label:"เพิ่มน้ำหนัก", adj:0.15},
];

const LS_KEYS = { profile:"impodee_profile", avatar:"impodee_avatar", apiKey:"impodee_api_key", logPrefix:"impodee_logs_" };

function todayStr(d = new Date()){ return d.toISOString().slice(0,10); }

function loadJSON(key, fallback){
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e){ return fallback; }
}
function saveJSON(key, val){ try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }

function calcTargets(p){
  const w=Number(p.weight), h=Number(p.height), a=Number(p.age);
  let bmr = p.gender==="male" ? 10*w+6.25*h-5*a+5 : 10*w+6.25*h-5*a-161;
  const actMult = (ACTIVITY_LEVELS.find(x=>x.id===p.activity)||ACTIVITY_LEVELS[0]).mult;
  const goalAdj = (GOALS.find(x=>x.id===p.goal)||GOALS[1]).adj;
  const tdee = bmr*actMult;
  const calories = Math.max(1000, Math.round(tdee*(1+goalAdj)));
  const protein = Math.round(w*1.8);
  const fat = Math.round((calories*0.25)/9);
  const carb = Math.max(0, Math.round((calories-protein*4-fat*9)/4));
  return { calories, protein, fat, carb, sodium:2000, tdee:Math.round(tdee) };
}

function sumLog(meals){
  return meals.reduce((acc,m)=>({
    calories: acc.calories+(Number(m.calories)||0),
    protein: acc.protein+(Number(m.protein)||0),
    fat: acc.fat+(Number(m.fat)||0),
    carb: acc.carb+(Number(m.carb)||0),
    sodium: acc.sodium+(Number(m.sodium)||0),
  }), {calories:0,protein:0,fat:0,carb:0,sodium:0});
}

function classifyMood(totals, targets){
  if(!totals.calories) return "idle";
  const r = totals.calories/targets.calories;
  if(r>1.1) return "full";
  if(r<0.85) return "hungry";
  return "happy";
}

/* ---------------- State ---------------- */
const DEFAULT_PROFILE = {gender:"male",age:"25",weight:"65",height:"170",activity:"sedentary",goal:"maintain"};
const DEFAULT_AVATAR = {skinTone:0,hairStyle:0,hairColor:0,shirtColor:0,pantsColor:0,shoeColor:0};

let state = {
  tab: "home",
  profile: loadJSON(LS_KEYS.profile, DEFAULT_PROFILE),
  avatar: loadJSON(LS_KEYS.avatar, DEFAULT_AVATAR),
  apiKey: localStorage.getItem(LS_KEYS.apiKey) || "",
  meals: loadJSON(LS_KEYS.logPrefix+todayStr(), []),
  form: {name:"",calories:"",protein:"",fat:"",carb:"",sodium:""},
  scanning:false,
  scanError:"",
  profileDraft:null,
};
state.profileDraft = {...state.profile};

function setState(patch){ state = {...state, ...patch}; render(); }

/* ---------------- Avatar SVG ---------------- */
function avatarSVG(config, mood, size){
  size = size||200;
  const skin=SKIN_TONES[config.skinTone], hairColor=HAIR_COLORS[config.hairColor];
  const shirt=SHIRT_COLORS[config.shirtColor], pants=PANTS_COLORS[config.pantsColor], shoe=SHOE_COLORS[config.shoeColor];
  const isFull=mood==="full", isHungry=mood==="hungry", isHappy=mood==="happy";
  const torsoScaleX = isHungry?0.82:1;

  let hair = "";
  if(config.hairStyle===0){ hair = `<path d="M58 58 Q100 20 142 58 Q142 40 100 34 Q58 40 58 58 Z" fill="${hairColor}"/>`; }
  else if(config.hairStyle===1){ hair = `<g fill="${hairColor}"><path d="M56 60 Q100 16 144 60 Q146 38 100 30 Q54 38 56 60 Z"/><circle cx="66" cy="52" r="9"/><circle cx="80" cy="40" r="10"/><circle cx="100" cy="35" r="10"/><circle cx="120" cy="40" r="10"/><circle cx="134" cy="52" r="9"/></g>`; }
  else if(config.hairStyle===2){ hair = `<path d="M55 62 Q52 20 100 22 Q148 20 145 62 Q140 30 100 30 Q60 30 55 62 Z M50 70 Q46 110 58 120 L60 78 Z M150 70 Q154 110 142 120 L140 78 Z" fill="${hairColor}"/>`; }
  else { hair = `<path d="M62 52 Q100 30 138 52 Q136 42 100 38 Q64 42 62 52 Z" fill="${hairColor}"/>`; }

  let eyes = (isHappy || mood==="idle")
    ? `<circle cx="84" cy="72" r="4.2" fill="#1C2B22"/><circle cx="116" cy="72" r="4.2" fill="#1C2B22"/>`
    : isFull
      ? `<path d="M78 70 Q84 65 90 70" stroke="#1C2B22" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M110 70 Q116 65 122 70" stroke="#1C2B22" stroke-width="3" fill="none" stroke-linecap="round"/>`
      : `<path d="M78 76 Q84 68 90 76" stroke="#1C2B22" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M110 76 Q116 68 122 76" stroke="#1C2B22" stroke-width="3" fill="none" stroke-linecap="round"/>`;

  let mouth = "";
  if(isHappy) mouth += `<path d="M82 90 Q100 106 118 90" stroke="#1C2B22" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  if(mood==="idle") mouth += `<path d="M84 92 Q100 98 116 92" stroke="#1C2B22" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;
  if(isFull) mouth += `<ellipse cx="100" cy="94" rx="7" ry="5" fill="#1C2B22"/><path d="M126 58 q6 4 4 12" stroke="#4C7EF3" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>`;
  if(isHungry) mouth += `<path d="M88 96 Q100 90 112 96" stroke="#1C2B22" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M128 60 q7 6 3 14" stroke="#4C7EF3" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>`;

  return `
  <svg viewBox="0 0 200 260" width="${size}" height="${Math.round(size*260/200)}" style="overflow:visible">
    <ellipse cx="100" cy="248" rx="46" ry="8" fill="#1C2B22" opacity="0.08"/>
    <rect x="72" y="168" width="20" height="55" rx="10" fill="${pants}"/>
    <rect x="108" y="168" width="20" height="55" rx="10" fill="${pants}"/>
    <ellipse cx="82" cy="228" rx="15" ry="9" fill="${shoe}" stroke="#1C2B22" stroke-opacity="0.15"/>
    <ellipse cx="118" cy="228" rx="15" ry="9" fill="${shoe}" stroke="#1C2B22" stroke-opacity="0.15"/>
    <g transform="translate(100 150) scale(${torsoScaleX} 1) translate(-100 -150)">
      <path d="M66 118 Q100 100 134 118 L140 178 Q100 196 60 178 Z" fill="${shirt}"/>
      ${isFull ? `<ellipse cx="100" cy="182" rx="34" ry="24" fill="${skin}" stroke="#00000012"/><ellipse cx="100" cy="176" rx="20" ry="6" fill="#FFFFFF" opacity="0.35"/>` : ""}
      ${isHungry ? `<g stroke="${hairColor}" stroke-opacity="0.18" stroke-width="2" fill="none"><path d="M78 132 Q100 138 122 132"/><path d="M76 146 Q100 153 124 146"/></g>` : ""}
    </g>
    <ellipse cx="58" cy="150" rx="12" ry="28" fill="${skin}" transform="rotate(-8 58 150)"/>
    <ellipse cx="142" cy="150" rx="12" ry="28" fill="${skin}" transform="rotate(8 142 150)"/>
    <circle cx="100" cy="70" r="42" fill="${skin}"/>
    <circle cx="60" cy="72" r="8" fill="${skin}"/>
    <circle cx="140" cy="72" r="8" fill="${skin}"/>
    ${hair}
    ${eyes}
    ${mouth}
    <circle cx="70" cy="84" r="6" fill="#FF6B4A" opacity="${isHappy?0.28:0.12}"/>
    <circle cx="130" cy="84" r="6" fill="#FF6B4A" opacity="${isHappy?0.28:0.12}"/>
  </svg>`;
}

/* ---------------- Screen renderers ---------------- */
function statRow(label, value, target, unit, color){
  const pct = Math.min(100, Math.round((value/Math.max(1,target))*100));
  return `<div style="margin-bottom:14px">
    <div class="row-between" style="margin-bottom:6px">
      <span style="font-size:14px;color:var(--ink-soft);font-weight:600">${label}</span>
      <span style="font-family:'Kanit';font-size:14px">${Math.round(value)} <span style="color:var(--ink-soft);font-weight:400">/ ${target} ${unit}</span></span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function homeScreen(){
  const targets = calcTargets(state.profile);
  const totals = sumLog(state.meals);
  const mood = classifyMood(totals, targets);
  const streak = computeStreak(targets);
  const moodText = {happy:"วันนี้ทานได้พอดีเป๊ะ ไปต่อ!",hungry:"พลังงานยังไม่พอนะ ทานเพิ่มอีกหน่อย",full:"ทานเกินเป้าหมายแล้ววันนี้",idle:"ยังไม่ได้บันทึกมื้ออาหารวันนี้เลย"}[mood];
  const moodColor = {happy:"var(--emerald)",hungry:"var(--blue)",full:"var(--coral)",idle:"var(--ink-soft)"}[mood];

  return `
  <div class="card" style="text-align:center;margin-bottom:16px">
    ${avatarSVG(state.avatar, mood, 150)}
    <div style="font-family:'Kanit';font-weight:600;font-size:15px;color:${moodColor};margin-top:6px">${moodText}</div>
    <button class="ghost-btn" onclick="setState({tab:'character'})">ปรับแต่งตัวละคร</button>
  </div>
  <div class="card">
    <div class="card-title">เป้าหมายวันนี้ (ตามค่า TDEE)</div>
    ${statRow("แคลอรี่", totals.calories, targets.calories, "kcal", "var(--gold)")}
    ${statRow("โปรตีน", totals.protein, targets.protein, "g", "var(--coral)")}
    ${statRow("ไขมัน", totals.fat, targets.fat, "g", "var(--blue)")}
    ${statRow("คาร์บ", totals.carb, targets.carb, "g", "var(--emerald)")}
    <div style="margin-top:4px">
      <div class="row-between" style="margin-bottom:6px">
        <span style="font-size:14px;color:var(--ink-soft);font-weight:600">โซเดียมสะสม</span>
        <span style="font-family:'Kanit';font-size:14px;color:${totals.sodium>targets.sodium?'var(--coral)':'var(--ink)'}">${Math.round(totals.sodium)} / ${targets.sodium} mg</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.min(100,Math.round(totals.sodium/targets.sodium*100))}%;background:${totals.sodium>targets.sodium?'var(--coral)':'var(--blue-deep)'}"></div></div>
    </div>
  </div>
  <div style="background:linear-gradient(135deg,var(--gold),var(--gold-deep));border-radius:20px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-top:16px">
    <div>
      <div style="color:#fff;font-size:13px;opacity:.9">สตรีคทานพอดี</div>
      <div style="font-family:'Kanit';color:#fff;font-size:26px;font-weight:700">${streak} วัน</div>
    </div>
    <span style="font-size:34px">🔥</span>
  </div>`;
}

function computeStreak(targets){
  let count = 0;
  const totals = sumLog(state.meals);
  const todayOnTarget = classifyMood(totals, targets)==="happy";
  if(todayOnTarget) count += 1;
  const cursor = new Date();
  cursor.setDate(cursor.getDate()-1);
  for(let i=0;i<60;i++){
    const key = LS_KEYS.logPrefix+todayStr(cursor);
    const raw = localStorage.getItem(key);
    if(raw===null) break;
    const dayMeals = JSON.parse(raw);
    const dayTotals = sumLog(dayMeals);
    const ratio = dayTotals.calories/Math.max(1,targets.calories);
    if(ratio>=0.85 && ratio<=1.1){ count+=1; cursor.setDate(cursor.getDate()-1); } else break;
  }
  return count;
}

function arrowPickerHTML(label, options, index, field, renderFn){
  const n = options.length;
  const inner = renderFn ? renderFn(options[index]) : `<span style="font-size:13px;color:var(--ink-soft)">${options[index]}</span>`;
  return `<div class="row-between card" style="padding:10px 12px;margin-bottom:10px">
    <span style="font-weight:600;font-size:14px;min-width:64px">${label}</span>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="arrow-btn" onclick="cycleAvatar('${field}', -1, ${n})">‹</button>
      <div style="min-width:56px;display:flex;justify-content:center">${inner}</div>
      <button class="arrow-btn" onclick="cycleAvatar('${field}', 1, ${n})">›</button>
    </div>
  </div>`;
}
function swatch(color){ return `<div class="swatch" style="background:${color};border:2px solid var(--ink);${color==='#FFFFFF'?'box-shadow:inset 0 0 0 1px #ddd;':''}"></div>`; }

function cycleAvatar(field, dir, n){
  const idx = state.avatar[field];
  const next = (idx + dir + n) % n;
  const avatar = {...state.avatar, [field]: next};
  saveJSON(LS_KEYS.avatar, avatar);
  setState({avatar});
}

function characterScreen(){
  const targets = calcTargets(state.profile);
  const totals = sumLog(state.meals);
  const mood = classifyMood(totals, targets);
  return `
  <div class="card" style="text-align:center;margin-bottom:16px">${avatarSVG(state.avatar, mood, 170)}</div>
  <div class="card">
    <div class="card-title">ปรับแต่งตัวละคร</div>
    ${arrowPickerHTML("ทรงผม", HAIR_STYLES, state.avatar.hairStyle, "hairStyle")}
    ${arrowPickerHTML("สีผม", HAIR_COLORS, state.avatar.hairColor, "hairColor", swatch)}
    ${arrowPickerHTML("สีผิว", SKIN_TONES, state.avatar.skinTone, "skinTone", swatch)}
    ${arrowPickerHTML("เสื้อ", SHIRT_COLORS, state.avatar.shirtColor, "shirtColor", swatch)}
    ${arrowPickerHTML("กางเกง", PANTS_COLORS, state.avatar.pantsColor, "pantsColor", swatch)}
    ${arrowPickerHTML("รองเท้า", SHOE_COLORS, state.avatar.shoeColor, "shoeColor", swatch)}
  </div>`;
}

function mealRowHTML(m){
  return `<div class="row-between" style="padding:10px 0;border-bottom:1px solid var(--line)">
    <div>
      <div style="font-weight:600;font-size:14px">${escapeHTML(m.name)}</div>
      <div style="font-size:12px;color:var(--ink-soft)">${m.calories} kcal · P${m.protein} F${m.fat} C${m.carb} · Na${m.sodium}mg</div>
    </div>
    <button onclick="deleteMeal('${m.id}')" style="border:none;background:transparent;color:var(--coral);font-size:13px">ลบ</button>
  </div>`;
}
function escapeHTML(s){ const d=document.createElement('div'); d.innerText=s; return d.innerHTML; }

function logScreen(){
  const f = state.form;
  const canSave = f.name.trim() && f.calories !== "";
  const hasKey = !!state.apiKey;
  return `
  <div class="card">
    <div class="card-title">มื้ออาหารทั้งหมดวันนี้</div>
    ${state.meals.length===0 ? `<div style="color:var(--ink-soft);font-size:14px;padding:8px 0">ยังไม่มีมื้ออาหารที่บันทึกวันนี้</div>` : state.meals.map(mealRowHTML).join("")}
  </div>
  <div style="height:16px"></div>
  <div class="card">
    <div class="card-title">เพิ่มมื้ออาหาร</div>
    ${!hasKey ? `<div style="background:var(--surface-soft);border-radius:12px;padding:10px 12px;font-size:12.5px;color:var(--ink-soft);margin-bottom:12px">
      ยังไม่ได้ใส่ Anthropic API key — ไปที่แท็บ <b>ตั้งค่า</b> เพื่อเปิดใช้การถ่ายรูปวิเคราะห์อาหารอัตโนมัติ (ไม่มี key ก็ยังกรอกข้อมูลเองได้ตามปกติ)
    </div>` : ""}
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button onclick="triggerCamera(false)" ${state.scanning||!hasKey?'disabled':''} style="flex:1;border:none;color:#fff;border-radius:14px;padding:12px 8px;font-weight:600;font-size:13px;background:var(--emerald);opacity:${hasKey?1:0.5}">📷 ถ่ายรูปอาหาร</button>
      <button onclick="triggerCamera(true)" ${state.scanning||!hasKey?'disabled':''} style="flex:1;border:none;color:#fff;border-radius:14px;padding:12px 8px;font-weight:600;font-size:13px;background:var(--blue);opacity:${hasKey?1:0.5}">🏷️ Scan Barcode</button>
    </div>
    <input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleImageSelected(this, false)"/>
    <input id="barcodeInput" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleImageSelected(this, true)"/>
    ${state.scanning ? `<div style="color:var(--ink-soft);font-size:13px;margin-bottom:10px">กำลังวิเคราะห์รูปภาพ...</div>` : ""}
    ${state.scanError ? `<div style="color:var(--coral);font-size:13px;margin-bottom:10px">${state.scanError}</div>` : ""}

    <div style="margin-bottom:10px">
      <div class="field-label">ชื่ออาหาร</div>
      <input class="field-input" value="${escapeAttr(f.name)}" oninput="updateForm('name', this.value)"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${formField("แคลอรี่ (kcal)","calories",f.calories)}
      ${formField("โซเดียม (mg)","sodium",f.sodium)}
      ${formField("โปรตีน (g)","protein",f.protein)}
      ${formField("ไขมัน (g)","fat",f.fat)}
      ${formField("คาร์บ (g)","carb",f.carb)}
    </div>
    <button class="primary-btn" style="margin-top:14px;opacity:${canSave?1:0.5}" onclick="submitMeal()" ${canSave?'':'disabled'}>บันทึกมื้ออาหาร</button>
  </div>`;
}
function formField(label, key, value){
  return `<div style="margin-bottom:10px">
    <div class="field-label">${label}</div>
    <input class="field-input" type="number" value="${escapeAttr(value)}" oninput="updateForm('${key}', this.value)"/>
  </div>`;
}
function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

function updateForm(key, value){ state.form = {...state.form, [key]: value}; /* no full re-render to keep focus */ }

function submitMeal(){
  const f = state.form;
  if(!f.name.trim() || f.calories==="") return;
  const meal = { id: Date.now().toString(), name: f.name.trim(), calories:Number(f.calories)||0, protein:Number(f.protein)||0, fat:Number(f.fat)||0, carb:Number(f.carb)||0, sodium:Number(f.sodium)||0 };
  const meals = [...state.meals, meal];
  saveJSON(LS_KEYS.logPrefix+todayStr(), meals);
  setState({ meals, form:{name:"",calories:"",protein:"",fat:"",carb:"",sodium:""} });
}
function deleteMeal(id){
  const meals = state.meals.filter(m=>m.id!==id);
  saveJSON(LS_KEYS.logPrefix+todayStr(), meals);
  setState({meals});
}

function triggerCamera(isBarcode){
  const el = document.getElementById(isBarcode?'barcodeInput':'cameraInput');
  if(el) el.click();
}

async function handleImageSelected(inputEl, isBarcode){
  const file = inputEl.files[0];
  if(!file) return;
  setState({scanning:true, scanError:""});
  try{
    const base64 = await new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res(r.result.split(",")[1]);
      r.onerror = ()=> rej(new Error("อ่านไฟล์ไม่สำเร็จ"));
      r.readAsDataURL(file);
    });
    const promptText = isBarcode
      ? "นี่คือรูปฉลากโภชนาการหรือบาร์โค้ดของผลิตภัณฑ์อาหาร กรุณาประเมินค่าโภชนาการต่อ 1 หน่วยบริโภคจากฉลาก (ถ้าอ่านได้) หรือประเมินคร่าวๆจากสิ่งที่เห็น ตอบกลับเป็น JSON เท่านั้น ไม่มีคำอธิบายอื่น รูปแบบ: {\"name\": string, \"calories\": number, \"protein\": number, \"fat\": number, \"carb\": number, \"sodium\": number} หน่วย: calories=kcal, protein/fat/carb=กรัม, sodium=มิลลิกรัม"
      : "นี่คือรูปอาหารหนึ่งมื้อ กรุณาประเมินค่าโภชนาการโดยรวมของอาหารในรูปนี้อย่างสมเหตุสมผล ตอบกลับเป็น JSON เท่านั้น ไม่มีคำอธิบายอื่น รูปแบบ: {\"name\": string, \"calories\": number, \"protein\": number, \"fat\": number, \"carb\": number, \"sodium\": number} หน่วย: calories=kcal, protein/fat/carb=กรัม, sodium=มิลลิกรัม";

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type: file.type || "image/jpeg", data: base64 } },
          { type:"text", text: promptText }
        ]}]
      })
    });
    const data = await response.json();
    if(data.error) throw new Error(data.error.message || "API error");
    const text = (data.content||[]).map(c=>c.text||"").join("");
    const clean = text.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);
    setState({
      form: {
        name: parsed.name || "อาหารจากรูปภาพ",
        calories: String(Math.round(parsed.calories||0)),
        protein: String(Math.round(parsed.protein||0)),
        fat: String(Math.round(parsed.fat||0)),
        carb: String(Math.round(parsed.carb||0)),
        sodium: String(Math.round(parsed.sodium||0)),
      },
      scanning:false
    });
  } catch(e){
    setState({ scanning:false, scanError: "วิเคราะห์รูปไม่สำเร็จ (" + e.message + ") กรุณากรอกข้อมูลเอง หรือตรวจสอบ API key" });
  } finally {
    inputEl.value = "";
  }
}

      <div><div class="field-label">ส่วนสูง (cm)</div><input class="field-input" type="number" value="${d.height}" oninput="setDraft('height', this.value)"/></div>

    </div>
    <button class="primary-btn" onclick="saveProfile()">บันทึกและคำนวณเป้าหมายใหม่</button>
  </div>
  <div style="height:16px"></div>
  <div class="card">
    <div class="card-title">สรุปค่า TDEE ปัจจุบัน</div>
    <div style="font-family:'Kanit';font-size:28px;font-weight:700">${targets.tdee} <span style="font-size:14px;color:var(--ink-soft);font-weight:400">kcal/วัน</span></div>
    <div style="font-size:13px;color:var(--ink-soft);margin-top:6px">เป้าหมายแคลอรี่ต่อวัน (ปรับตามเป้าหมาย): ${targets.calories} kcal</div>
  </div>`;
}
function setDraft(key,val){ state.profileDraft = {...state.profileDraft, [key]:val}; render(); }
function saveProfile(){ saveJSON(LS_KEYS.profile, state.profileDraft); setState({profile:{...state.profileDraft}}); }

function settingsScreen(){
  return `
  <div class="card">
    <div class="card-title">ตั้งค่า API สำหรับสแกนอาหาร</div>
    <div style="background:var(--surface-soft);border-radius:12px;padding:12px;font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;line-height:1.6">
      ⚠️ <b>คำเตือนความปลอดภัย:</b> API key ที่กรอกด้านล่างจะถูกเก็บไว้ใน localStorage ของเบราว์เซอร์นี้เท่านั้น และถูกใช้เรียก Anthropic API โดยตรงจากฝั่งเบราว์เซอร์ (client-side) หากคุณ deploy เว็บนี้แบบสาธารณะ <b>อย่าฝัง key ไว้ในโค้ดที่ push ขึ้น GitHub</b> — ให้ผู้ใช้แต่ละคนกรอก key ของตัวเองในหน้านี้แทน เหมาะสำหรับใช้ทดสอบส่วนตัวเท่านั้น ถ้าจะใช้งานจริงกับผู้ใช้หลายคน ควรทำ backend/serverless proxy มาบังหน้า key แทน
    </div>
    <div class="field-label">Anthropic API key</div>
    <input class="field-input" type="password" placeholder="sk-ant-..." value="${escapeAttr(state.apiKey)}" oninput="updateApiKeyDraft(this.value)" style="margin-bottom:12px"/>
    <button class="primary-btn" onclick="saveApiKey()">บันทึก API key</button>
    ${state.apiKey ? `<button onclick="clearApiKey()" style="width:100%;border:1.5px solid var(--coral);color:var(--coral-deep);background:transparent;border-radius:14px;padding:11px 0;font-weight:600;font-size:14px;margin-top:10px">ลบ API key ออกจากเครื่องนี้</button>` : ""}
  </div>`;
}
let apiKeyDraft = state.apiKey;
function updateApiKeyDraft(v){ apiKeyDraft = v; }
function saveApiKey(){ localStorage.setItem(LS_KEYS.apiKey, apiKeyDraft.trim()); setState({apiKey: apiKeyDraft.trim()}); }
function clearApiKey(){ localStorage.removeItem(LS_KEYS.apiKey); apiKeyDraft=""; setState({apiKey:""}); }

/* ---------------- Root render ---------------- */
const TABS = [
  {id:"home", label:"หน้าหลัก", icon:"🏠"},
  {id:"character", label:"ตัวละคร", icon:"🧍"},
  {id:"log", label:"มื้ออาหาร", icon:"🍽️"},
  {id:"profile", label:"โปรไฟล์", icon:"⚙️"},
  {id:"settings", label:"ตั้งค่า", icon:"🔑"},
];

function render(){
  const targets = calcTargets(state.profile);
  const streak = computeStreak(targets);
  let body = "";
  if(state.tab==="home") body = homeScreen();
  else if(state.tab==="character") body = characterScreen();
  else if(state.tab==="log") body = logScreen();
  else if(state.tab==="profile") body = profileScreen();
  else if(state.tab==="settings") body = settingsScreen();

  document.getElementById("root").innerHTML = `
    <div class="row-between" style="margin-bottom:18px">
      <div>
        <div style="font-family:'Kanit';font-weight:700;font-size:22px">อิ่มพอดี</div>
        <div style="font-size:12.5px;color:var(--ink-soft)">ผู้ช่วยคำนวณอาหารตาม TDEE</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:6px 12px">
        <span>🔥</span><span style="font-family:'Kanit';font-weight:600;font-size:14px">${streak}</span>
      </div>
    </div>
    ${body}
    <div class="tabbar">
      <div class="tabbar-inner">
        ${TABS.map(t=>`<button class="tab-btn ${state.tab===t.id?'active':''}" onclick="setState({tab:'${t.id}'})">
          <span style="font-size:18px">${t.icon}</span><span style="font-size:11px;font-weight:600">${t.label}</span>
        </button>`).join("")}
      </div>
    </div>
  `;
}

render();
</script>
